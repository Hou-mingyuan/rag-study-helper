version: "3.8"

# Milvus 向量数据库（Standalone 模式）— 大型/生产
#
# Milvus 依赖 etcd（元数据存储）和 MinIO（数据持久化）。
# 首次启动会下载镜像，约需几分钟。
#
# 使用方式：
#   1. 创建 .env 文件（参考下方示例）或直接设置环境变量
#   2. 构建并启动:  docker compose -f docker-compose-milvus.yml up -d
#   3. 查看日志:    docker compose -f docker-compose-milvus.yml logs -f
#   4. 等待就绪:    docker compose -f docker-compose-milvus.yml ps
#                  等待 milvus 状态变为 healthy（约 1-2 分钟）
#   5. 访问:       http://localhost:8080
#   6. 停止:       docker compose -f docker-compose-milvus.yml down
#   7. 清理数据:   docker compose -f docker-compose-milvus.yml down -v
#
# .env 文件示例：
#   APP_RAG_CHAT_API_KEY=sk-deepseek-xxx
#   APP_RAG_EMBEDDING_API_KEY=sk-siliconflow-xxx
#   APP_FEISHU_APP_ID=cli_xxx
#   APP_FEISHU_APP_SECRET=xxx
#   APP_FEISHU_WIKI_ID=7327625190885801988

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: rag-milvus-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd-data:/etcd
    command: |
      etcd --data-dir=/etcd
        --listen-client-urls http://0.0.0.0:2379
        --advertise-client-urls http://0.0.0.0:2379

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: rag-milvus-minio
    ports:
      - "9001:9001"
    volumes:
      - minio-data:/minio_data
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.3.3
    container_name: rag-milvus
    command: milvus run standalone
    ports:
      - "19530:19530"   # gRPC
      - "9091:9091"     # HTTP
    volumes:
      - milvus-data:/var/lib/milvus
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    depends_on:
      - etcd
      - minio
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: rag-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: rag_study_helper
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: rag-app
    ports:
      - "8080:8080"
    environment:
      # === 向量库 ===
      VECTOR_STORE_TYPE: milvus
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      # === MySQL ===
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/rag_study_helper?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      # === Redis ===
      SPRING_REDIS_HOST: ${SPRING_REDIS_HOST:-redis}
      SPRING_REDIS_PORT: ${SPRING_REDIS_PORT:-6379}
      SPRING_REDIS_PASSWORD: ${SPRING_REDIS_PASSWORD:-}
      # === RAG 基础配置 ===
      APP_RAG_CHAT_API_KEY: ${APP_RAG_CHAT_API_KEY}
      APP_RAG_CHAT_BASE_URL: ${APP_RAG_CHAT_BASE_URL:-https://api.deepseek.com}
      APP_RAG_CHAT_MODEL_NAME: ${APP_RAG_CHAT_MODEL_NAME:-deepseek-v4-flash}
      APP_RAG_EMBEDDING_API_KEY: ${APP_RAG_EMBEDDING_API_KEY}
      APP_RAG_EMBEDDING_BASE_URL: ${APP_RAG_EMBEDDING_BASE_URL:-https://api.siliconflow.cn/v1}
      APP_RAG_EMBEDDING_MODEL_NAME: ${APP_RAG_EMBEDDING_MODEL_NAME:-BAAI/bge-large-zh-v1.5}
      APP_RAG_RERANK_API_KEY: ${APP_RAG_RERANK_API_KEY:-${APP_RAG_EMBEDDING_API_KEY}}
      APP_RAG_RERANK_BASE_URL: ${APP_RAG_RERANK_BASE_URL:-https://api.siliconflow.cn/v1}
      APP_RAG_RERANK_MODEL_NAME: ${APP_RAG_RERANK_MODEL_NAME:-BAAI/bge-reranker-v2-m3}
      APP_RAG_SCORE_THRESHOLD: ${APP_RAG_SCORE_THRESHOLD:-0.80}
      # === 飞书同步（可选）===
      APP_FEISHU_APP_ID: ${APP_FEISHU_APP_ID:-}
      APP_FEISHU_APP_SECRET: ${APP_FEISHU_APP_SECRET:-}
      APP_FEISHU_WIKI_ID: ${APP_FEISHU_WIKI_ID:-}
      APP_FEISHU_CRON: ${APP_FEISHU_CRON:-0 0 */12 * * ?}
      APP_FEISHU_SYNC_ENABLED: ${APP_FEISHU_SYNC_ENABLED:-false}
    depends_on:
      milvus:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  etcd-data:
  minio-data:
  milvus-data:
  mysql-data:
