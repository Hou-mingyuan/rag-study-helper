<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG 智能问答</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ========== Reset & Base ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "Microsoft YaHei", sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  background: var(--bg-app);
  color: var(--text-primary);
  transition: background var(--transition-slow), color var(--transition-slow);
}

/* ========== Theme: Light (default) ========== */
:root {
  --bg-app: #f0f2f6;
  --bg-sidebar: #ffffff;
  --bg-main: #ffffff;
  --bg-surface: #f4f5f9;
  --bg-hover: #edeef3;
  --bg-active: #e8edfb;
  --bg-bubble-user: #2563eb;
  --bg-bubble-assistant: #ffffff;
  --bg-input: #ffffff;
  --bg-code: #1a1b2e;
  --border: #e3e5eb;
  --border-light: #eef0f4;
  --text-primary: #1a1d28;
  --text-secondary: #5c677d;
  --text-muted: #8d97ab;
  --text-on-accent: #ffffff;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --accent-light: rgba(37,99,235,0.10);
  --accent-ring: rgba(37,99,235,0.28);
  --danger: #dc2626;
  --danger-light: rgba(220,38,38,0.10);
  --success: #16a34a;
  --success-light: rgba(22,163,74,0.10);
  --shadow-xs: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.07);
  --shadow-xl: 0 16px 48px rgba(0,0,0,0.09);
  --radius-xs: 6px;
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 18px;
  --radius-xl: 22px;
  --radius-round: 9999px;
  --sidebar-w: 300px;
  --header-h: 60px;
  --transition: 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  --transition-slow: 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  --z-sidebar: 100;
  --z-overlay: 200;
  --z-panel: 300;
  --z-modal-backdrop: 400;
  --z-modal: 410;
  --z-toast: 500;
}

/* ========== Theme: Dark ========== */
.light-theme {
  --bg-app: #0d0d14;
  --bg-sidebar: #12121a;
  --bg-main: #0f0f17;
  --bg-surface: #181822;
  --bg-hover: #1e1e2a;
  --bg-active: #181f3a;
  --bg-bubble-user: #2563eb;
  --bg-bubble-assistant: #181822;
  --bg-input: #181822;
  --bg-code: #090912;
  --border: rgba(255,255,255,0.07);
  --border-light: rgba(255,255,255,0.04);
  --text-primary: #e0e0ea;
  --text-secondary: #82829c;
  --text-muted: #52526e;
  --accent: #3b82f6;
  --accent-hover: #60a5fa;
  --accent-light: rgba(59,130,246,0.14);
  --accent-ring: rgba(59,130,246,0.30);
  --danger: #f87171;
  --danger-light: rgba(248,113,113,0.13);
  --success: #4ade80;
  --success-light: rgba(74,222,128,0.13);
  --shadow-xs: 0 1px 2px rgba(0,0,0,0.2);
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.25);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.28);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.32);
  --shadow-xl: 0 16px 48px rgba(0,0,0,0.38);
}

/* ========== Layout ========== */
.app { display: flex; height: 100vh; width: 100%; }

/* ========== Scrollbar ========== */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: var(--radius-round); }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ========== Sidebar ========== */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: var(--z-sidebar);
  position: relative;
  transition: transform var(--transition-slow);
}
.sidebar-header {
  padding: 18px 16px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  flex-shrink: 0;
}
.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: var(--text-primary);
}
.sidebar-logo {
  width: 34px;
  height: 34px;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--accent), #7c3aed);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(37,99,235,0.20);
}
.sidebar-logo svg { width: 20px; height: 20px; fill: white; }
.sidebar-brand span {
  font-family: "Outfit", sans-serif;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.03em;
}
.new-chat-btn {
  width: 34px;
  height: 34px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  flex-shrink: 0;
}
.new-chat-btn:hover {
  background: var(--accent-light);
  color: var(--accent);
  border-color: var(--accent);
}
.new-chat-btn:active { transform: scale(0.92); }
.new-chat-btn svg { width: 16px; height: 16px; }

/* Search */
.sidebar-search {
  padding: 8px 16px 6px;
  flex-shrink: 0;
  position: relative;
}
.sidebar-search .search-icon {
  position: absolute;
  left: 28px;
  top: 17px;
  color: var(--text-muted);
  pointer-events: none;
  display: flex;
  align-items: center;
}
.sidebar-search .search-icon svg { width: 14px; height: 14px; }
.sidebar-search input {
  width: 100%;
  padding: 9px 12px 9px 36px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-surface);
  color: var(--text-primary);
  font-size: 13px;
  outline: none;
  transition: all var(--transition);
}
.sidebar-search input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-ring);
  background: var(--bg-input);
}
.sidebar-search input::placeholder { color: var(--text-muted); }

/* Conversation List */
.conversation-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 8px 8px;
}
.conv-item {
  display: flex;
  align-items: center;
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  margin-bottom: 2px;
  transition: all var(--transition);
  position: relative;
  gap: 10px;
}
.conv-item:hover { background: var(--bg-hover); }
.conv-item.active {
  background: var(--accent-light);
}
.conv-item .conv-avatar {
  width: 30px;
  height: 30px;
  border-radius: var(--radius-xs);
  background: var(--bg-surface);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: var(--text-muted);
  transition: all var(--transition);
}
.conv-item.active .conv-avatar {
  background: var(--accent);
  color: white;
}
.conv-item .conv-avatar svg { width: 15px; height: 15px; }
.conv-item .conv-info { flex: 1; min-width: 0; }
.conv-item .conv-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
}
.conv-item .conv-meta {
  font-size: 11px;
  font-weight: 400;
  color: var(--text-muted);
  margin-top: 2px;
}
.conv-item .conv-delete {
  opacity: 0;
  width: 26px;
  height: 26px;
  border-radius: var(--radius-xs);
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  flex-shrink: 0;
}
.conv-item:hover .conv-delete { opacity: 1; }
.conv-item .conv-delete:hover { color: var(--danger); background: var(--danger-light); }
.conv-item .conv-delete svg { width: 14px; height: 14px; }

/* Sidebar Footer */
.sidebar-footer {
  padding: 10px 12px 14px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex-shrink: 0;
}
.sidebar-footer-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  transition: all var(--transition);
  width: 100%;
  text-align: left;
}
.sidebar-footer-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.sidebar-footer-btn:active { transform: scale(0.98); }
.sidebar-footer-btn svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  color: var(--text-muted);
  transition: color var(--transition);
}
.sidebar-footer-btn:hover svg { color: var(--text-secondary); }

/* ========== Main Content ========== */
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  position: relative;
  background: var(--bg-main);
}

/* Chat Header */
.chat-header {
  height: var(--header-h);
  padding: 0 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: var(--bg-main);
  flex-shrink: 0;
}
.chat-header-left {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}
.sidebar-toggle, .sidebar-back {
  display: none;
  width: 34px;
  height: 34px;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  align-items: center;
  justify-content: center;
  transition: background var(--transition);
  flex-shrink: 0;
}
.sidebar-toggle:hover, .sidebar-back:hover { background: var(--bg-hover); }
.sidebar-toggle:active, .sidebar-back:active { transform: scale(0.95); }
.sidebar-toggle svg, .sidebar-back svg { width: 18px; height: 18px; }
.chat-title {
  font-size: 14px;
  font-weight: 600;
  font-family: "Outfit", sans-serif;
  color: var(--text-primary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  letter-spacing: -0.01em;
}
.chat-header-actions { display: flex; gap: 4px; }
.chat-header-actions button {
  width: 34px;
  height: 34px;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
}
.chat-header-actions button:hover { background: var(--bg-hover); color: var(--text-secondary); }
.chat-header-actions button:active { transform: scale(0.92); }
.chat-header-actions button svg { width: 16px; height: 16px; }

/* Messages */
.messages-container {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
}
.messages {
  max-width: 760px;
  margin: 0 auto;
  padding: 24px 28px 16px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

/* Empty State */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  text-align: center;
  user-select: none;
}
.empty-state .empty-icon {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #7c3aed);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 24px;
  box-shadow: 0 12px 40px rgba(37,99,235,0.22);
  transition: transform var(--transition);
}
.empty-state:hover .empty-icon { transform: scale(1.03); }
.empty-state .empty-icon svg { width: 36px; height: 36px; fill: white; }
.empty-state h3 {
  font-family: "Outfit", sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 8px;
  letter-spacing: -0.02em;
}
.empty-state p {
  font-size: 14px;
  color: var(--text-secondary);
  max-width: 340px;
  line-height: 1.6;
}
.suggest-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-top: 18px;
  max-width: 520px;
}
.suggest-chip {
  padding: 8px 14px;
  border-radius: var(--radius-round);
  border: 1px solid var(--border);
  background: var(--bg-main);
  color: var(--text-secondary);
  font-size: 13px;
  cursor: pointer;
  transition: all var(--transition);
}
.suggest-chip:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-light);
}
.kb-doc-badge {
  margin-left: auto;
  min-width: 20px;
  height: 20px;
  padding: 0 6px;
  border-radius: var(--radius-round);
  background: var(--accent-light);
  color: var(--accent);
  font-size: 11px;
  font-weight: 700;
  display: none;
  align-items: center;
  justify-content: center;
}
.kb-doc-badge.visible { display: inline-flex; }
.stream-status {
  max-width: 760px;
  margin: 0 auto 8px;
  font-size: 12px;
  color: var(--text-muted);
  min-height: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.stream-status.active { color: var(--accent); }
.stream-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse-dot 1s ease infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 0.35; transform: scale(0.85); }
  50% { opacity: 1; transform: scale(1); }
}

/* Message Bubbles */
.message-wrapper {
  display: flex;
  gap: 12px;
  animation: msg-fade-in 0.3s var(--transition);
  position: relative;
}
@keyframes msg-fade-in {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.message-wrapper.user { justify-content: flex-end; }
.message-wrapper.user .message-avatar { order: 1; }
.message-wrapper.user + .message-wrapper.user,
.message-wrapper.assistant + .message-wrapper.assistant {
  margin-top: -4px;
}

.message-avatar {
  width: 34px;
  height: 34px;
  border-radius: var(--radius-xs);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 4px;
  transition: transform var(--transition);
}
.message-avatar.user {
  background: var(--accent);
  color: white;
}
.message-avatar.assistant {
  background: linear-gradient(135deg, var(--accent), #7c3aed);
  color: white;
}
.message-avatar svg { width: 17px; height: 17px; fill: currentColor; }

.message-body { max-width: calc(100% - 46px); min-width: 0; }
.message {
  padding: 12px 18px;
  border-radius: var(--radius-lg);
  font-size: 15px;
  line-height: 1.7;
  word-wrap: break-word;
  position: relative;
}
.message.user {
  background: var(--bg-bubble-user);
  color: white;
  border-bottom-right-radius: 6px;
  box-shadow: 0 2px 8px rgba(37,99,235,0.18);
}
.message.assistant {
  background: var(--bg-bubble-assistant);
  color: var(--text-primary);
  border: 1px solid var(--border-light);
  border-bottom-left-radius: 6px;
  box-shadow: var(--shadow-xs);
}
.message.error {
  background: var(--danger-light);
  color: var(--danger);
  border: 1px solid rgba(220,38,38,0.12);
  border-bottom-left-radius: 6px;
}

/* Copy button */
.message-footer {
  display: flex;
  align-items: center;
  padding-top: 5px;
  gap: 8px;
  opacity: 0;
  transition: opacity 0.15s ease;
}
.message-wrapper.assistant .message-footer { justify-content: flex-start; }
.message-wrapper.user .message-footer { justify-content: flex-end; }
.message-wrapper:hover .message-footer,
.message-footer:has(.copy-btn:focus-visible) { opacity: 1; }
.copy-btn {
  width: 30px;
  height: 30px;
  border-radius: var(--radius-xs);
  border: 1px solid var(--border);
  background: var(--bg-main);
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-xs);
  transition: all 0.15s ease;
}
.copy-btn:hover { color: var(--text-primary); border-color: var(--text-muted); background: var(--bg-surface); }
.copy-btn.copied { color: var(--success); border-color: var(--success); background: var(--success-light); }
.copy-btn svg { width: 14px; height: 14px; }

.msg-time {
  font-size: 11px;
  color: var(--text-muted);
  padding-top: 4px;
  user-select: none;
}

/* Message content styling */
.message p { margin: 0 0 8px; }
.message p:last-child { margin-bottom: 0; }
.message ul, .message ol { padding-left: 20px; margin: 6px 0; }
.message blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 12px;
  margin: 8px 0;
  color: var(--text-secondary);
}
.message table {
  border-collapse: collapse;
  margin: 8px 0;
  font-size: 14px;
  width: 100%;
}
.message th, .message td {
  border: 1px solid var(--border);
  padding: 6px 10px;
  text-align: left;
}
.message th { background: var(--bg-surface); font-weight: 600; }
.message h1, .message h2, .message h3 { margin: 12px 0 6px; font-weight: 600; font-family: "Outfit", sans-serif; }
.message h1 { font-size: 18px; }
.message h2 { font-size: 16px; }
.message h3 { font-size: 15px; }

.message code {
  background: var(--bg-code);
  color: #f0c674;
  padding: 2px 7px;
  border-radius: 5px;
  font-size: 13px;
  font-family: "JetBrains Mono", "SF Mono", "Fira Code", monospace;
}
.message pre {
  background: var(--bg-code);
  padding: 16px 18px;
  border-radius: var(--radius-sm);
  overflow-x: auto;
  margin: 10px 0;
  border: 1px solid rgba(255,255,255,0.06);
}
.message pre code { background: none; padding: 0; font-size: 13px; color: inherit; }
.message a { color: var(--accent); text-decoration: none; font-weight: 500; }
.message a:hover { text-decoration: underline; }

/* Cursor blink */
.cursor-blink {
  display: inline-block;
  width: 2px;
  height: 15px;
  background: var(--accent);
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink 0.8s step-end infinite;
  border-radius: 2px;
}
@keyframes blink { 50% { opacity: 0; } }

/* ========== Input Area ========== */
.input-area {
  padding: 16px 28px 24px;
  background: var(--bg-main);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.input-wrapper {
  max-width: 760px;
  margin: 0 auto;
  display: flex;
  gap: 10px;
  align-items: flex-end;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 8px 8px 8px 20px;
  transition: all var(--transition);
  box-shadow: var(--shadow-xs);
}
.input-wrapper:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-ring);
}
.input-wrapper textarea {
  flex: 1;
  border: none;
  background: transparent;
  padding: 7px 4px;
  font-size: 15px;
  font-family: inherit;
  outline: none;
  resize: none;
  line-height: 1.5;
  max-height: 160px;
  color: var(--text-primary);
}
.input-wrapper textarea::placeholder { color: var(--text-muted); }

.send-btn {
  width: 38px;
  height: 38px;
  border-radius: var(--radius-sm);
  border: none;
  background: var(--accent);
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  flex-shrink: 0;
}
.send-btn:hover { background: var(--accent-hover); transform: scale(1.04); }
.send-btn:active { transform: scale(0.94); }
.send-btn svg { width: 17px; height: 17px; }
.send-btn.stop {
  background: var(--danger);
}
.send-btn.stop:hover {
  background: #b91c1c;
}

/* ========== Knowledge Base Panel ========== */
.kb-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: var(--z-overlay);
  visibility: hidden;
  opacity: 0;
  pointer-events: none;
  transition: visibility 0.2s, opacity 0.2s ease;
}
.kb-overlay.open {
  visibility: visible;
  opacity: 1;
  pointer-events: auto;
}

.kb-panel {
  position: fixed;
  top: 0;
  right: -420px;
  width: 420px;
  max-width: 92vw;
  height: 100vh;
  background: var(--bg-sidebar);
  border-left: 1px solid var(--border);
  z-index: var(--z-panel);
  display: flex;
  flex-direction: column;
  transition: right var(--transition-slow);
  box-shadow: var(--shadow-xl);
}
.kb-panel.open { right: 0; }

.kb-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 22px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.kb-header h2 {
  font-family: "Outfit", sans-serif;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.kb-close {
  width: 34px;
  height: 34px;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
}
.kb-close:hover { background: var(--bg-hover); color: var(--text-primary); }
.kb-close:active { transform: scale(0.92); }
.kb-close svg { width: 18px; height: 18px; }

.kb-body {
  flex: 1;
  overflow-y: auto;
  padding: 22px;
}

.kb-section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  margin-bottom: 12px;
}

.upload-area {
  border: 2px dashed var(--border);
  border-radius: var(--radius-md);
  padding: 30px 20px;
  text-align: center;
  cursor: pointer;
  transition: all var(--transition);
  margin-bottom: 24px;
  color: var(--text-muted);
  font-size: 13px;
}
.upload-area:hover {
  border-color: var(--accent);
  background: var(--accent-light);
}
.upload-area.dragover {
  border-color: var(--accent);
  background: var(--accent-light);
}
.upload-icon { margin-bottom: 10px; }
.upload-icon svg { width: 36px; height: 36px; color: var(--text-muted); stroke-width: 1.5; }
.upload-area input[type="file"] { display: none; }

.upload-progress {
  display: none;
  margin: -16px 0 20px;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-surface);
}
.upload-progress.visible { display: block; }
.upload-progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 8px;
}
.upload-progress-bar {
  height: 6px;
  border-radius: var(--radius-round);
  background: var(--border-light);
  overflow: hidden;
}
.upload-progress-fill {
  height: 100%;
  width: 0%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--accent), #7c3aed);
  transition: width 0.15s ease;
}
.upload-progress.processing .upload-progress-fill {
  width: 100%;
  background-size: 200% 100%;
  animation: upload-indeterminate 1.2s ease infinite;
}
.chunk-preview-panel {
  display: none;
  margin-top: 16px;
  padding: 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--bg-surface);
  max-height: 320px;
  overflow-y: auto;
}
.chunk-preview-panel.open { display: block; }
.chunk-preview-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 10px;
}
.chunk-preview-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.4;
}
.chunk-preview-sub {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 400;
  margin-top: 2px;
}
.chunk-preview-actions { display: flex; gap: 6px; flex-shrink: 0; }
.chunk-preview-btn {
  font-size: 11px;
  padding: 4px 8px;
  border-radius: var(--radius-xs);
  border: 1px solid var(--border);
  background: var(--bg-main);
  color: var(--text-secondary);
  cursor: pointer;
}
.chunk-preview-btn:hover { border-color: var(--accent); color: var(--accent); }
.chunk-preview-item {
  padding: 10px 12px;
  border-radius: var(--radius-xs);
  background: var(--bg-main);
  border: 1px solid var(--border-light);
  margin-bottom: 8px;
  font-size: 12px;
  line-height: 1.55;
  color: var(--text-secondary);
  cursor: pointer;
  transition: border-color 0.15s ease;
}
.chunk-preview-item:hover { border-color: var(--accent); }
.chunk-preview-item.expanded { max-height: none; white-space: pre-wrap; }
.chunk-preview-item strong {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  font-size: 11px;
  color: var(--accent);
  margin-bottom: 4px;
  font-weight: 600;
}
.chunk-preview-item .chunk-copy {
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 500;
  padding: 2px 6px;
  border: 1px solid var(--border-light);
  border-radius: 4px;
  cursor: pointer;
}
.chunk-preview-item .chunk-copy:hover { color: var(--accent); }
.chunk-preview-load {
  width: 100%;
  margin-top: 4px;
  padding: 8px;
  font-size: 12px;
  border: 1px dashed var(--border);
  border-radius: var(--radius-xs);
  background: transparent;
  color: var(--accent);
  cursor: pointer;
}
.chunk-preview-load:disabled { opacity: 0.5; cursor: not-allowed; }

.retrieval-panel {
  margin-bottom: 10px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--bg-surface);
}
.retrieval-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 8px;
}
.retrieval-panel-toggle {
  font-size: 11px;
  padding: 2px 8px;
  border: 1px solid var(--border-light);
  border-radius: var(--radius-xs);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
}
.retrieval-panel-toggle:hover { border-color: var(--accent); color: var(--accent); }
.retrieval-panel.collapsed .retrieval-snippet-list { display: none; }
.retrieval-snippet-list { display: flex; flex-direction: column; gap: 8px; }
.retrieval-snippet {
  padding: 8px 10px;
  border-radius: var(--radius-xs);
  border: 1px solid var(--border-light);
  background: var(--bg-main);
  font-size: 12px;
  line-height: 1.55;
  color: var(--text-secondary);
  cursor: pointer;
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}
.retrieval-snippet:hover {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.12);
}
.retrieval-snippet-source {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 4px;
}
.retrieval-snippet-text { white-space: pre-wrap; word-break: break-word; }
mark.snippet-highlight {
  background: rgba(250, 204, 21, 0.35);
  color: inherit;
  padding: 0 2px;
  border-radius: 2px;
}
.light-theme mark.snippet-highlight { background: rgba(234, 179, 8, 0.45); }

.doc-list { list-style: none; }
.doc-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  font-size: 13px;
  transition: all var(--transition);
  cursor: pointer;
}
.doc-item.selected {
  border-color: var(--accent);
  background: var(--accent-light);
  box-shadow: var(--shadow-xs);
}
.doc-item:hover { background: var(--bg-hover); }
.doc-item.selected:hover { background: var(--accent-light); }
.doc-item .doc-icon {
  width: 30px;
  height: 30px;
  border-radius: var(--radius-xs);
  background: var(--bg-surface);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  flex-shrink: 0;
}
.doc-item .doc-icon svg { width: 15px; height: 15px; }
.doc-item .doc-info { flex: 1; min-width: 0; }
.doc-item .doc-name {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 13px;
  color: var(--text-primary);
}
.doc-item .doc-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.doc-delete-btn {
  width: 28px; height: 28px;
  border-radius: var(--radius-xs);
  border: none;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.15s ease, color 0.15s ease, background 0.15s ease;
}
.doc-item:hover .doc-delete-btn { opacity: 1; }
.doc-delete-btn:hover { color: var(--danger); background: var(--danger-light); }
.doc-delete-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.doc-empty {
  text-align: center;
  color: var(--text-muted);
  padding: 28px 0;
  font-size: 13px;
}
.doc-error { color: var(--danger); font-size: 12px; margin-top: 8px; display: none; }
.doc-error.visible { display: block; }

.scan-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  margin-top: 14px;
  padding: 10px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  transition: all var(--transition);
}
.scan-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.scan-btn:active { transform: scale(0.98); }
.scan-btn svg { width: 14px; height: 14px; }

/* ========== Toast ========== */
.toast-container {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: var(--z-toast);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  pointer-events: none;
}
.toast {
  padding: 11px 20px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  max-width: 440px;
  color: white;
  pointer-events: auto;
  display: flex;
  align-items: center;
  gap: 10px;
  line-height: 1.4;
  border: 1px solid rgba(255,255,255,0.12);
  opacity: 0;
  animation: toast-up 0.25s var(--transition) forwards;
}
.toast.success { background: #059669; }
.toast.error { background: #dc2626; }
.toast.info { background: var(--accent); }
@keyframes toast-up {
  from { opacity: 0; transform: translateY(16px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* ========== Modal ========== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  z-index: var(--z-modal-backdrop);
  display: flex;
  align-items: center;
  justify-content: center;
  visibility: hidden;
  opacity: 0;
  pointer-events: none;
  transition: visibility 0.12s, opacity 0.12s ease;
}
.modal-overlay.open {
  visibility: visible;
  opacity: 1;
  pointer-events: auto;
}

.modal-dialog {
  background: var(--bg-main);
  border-radius: var(--radius-lg);
  padding: 34px 30px 26px;
  width: 360px;
  max-width: 88vw;
  box-shadow: var(--shadow-xl);
  text-align: center;
  z-index: var(--z-modal);
  transform: scale(0.95) translateY(8px);
  opacity: 0;
  transition: transform 0.12s var(--transition), opacity 0.12s var(--transition);
}
.modal-overlay.open .modal-dialog {
  transform: scale(1) translateY(0);
  opacity: 1;
}

.modal-icon {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: var(--danger-light);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 18px;
}
.modal-icon svg {
  width: 26px;
  height: 26px;
  color: var(--danger);
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.modal-title {
  font-family: "Outfit", sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 8px;
}
.modal-message {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.5;
  margin-bottom: 26px;
}

.modal-actions {
  display: flex;
  gap: 10px;
}
.modal-actions button {
  flex: 1;
  height: 42px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  border: none;
  font-family: inherit;
}
.modal-btn-cancel {
  background: var(--bg-surface);
  color: var(--text-primary);
  border: 1px solid var(--border);
}
.modal-btn-cancel:hover { background: var(--bg-hover); }
.modal-btn-cancel:active { transform: scale(0.97); }
.modal-btn-danger { background: #dc2626; color: white; }
.modal-btn-danger:hover { background: #b91c1c; }
.modal-btn-danger:active { transform: scale(0.97); }

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* ========== Responsive ========== */
@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    left: 0;
    top: 0;
    height: 100%;
    transform: translateX(-100%);
    box-shadow: var(--shadow-xl);
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-toggle { display: flex !important; }
  .sidebar-back { display: flex !important; }
  .message-wrapper { gap: 8px; }
  .message { font-size: 14px; padding: 10px 14px; }
  .messages { padding: 18px 16px; gap: 16px; }
  .input-area { padding: 12px 16px 20px; }
  .input-wrapper { padding: 6px 6px 6px 14px; }
  .kb-panel { width: 100%; max-width: 100%; }
  .chat-header { padding: 0 16px; }
}

/* ========== SVG Icons ========== */
.icon { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>

<div class="app">
  <!-- ======== Sidebar ======== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="sidebar-back" onclick="closeSidebarMobile()">
        <svg viewBox="0 0 24 24" class="icon"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </button>
      <a class="sidebar-brand" href="#">
        <div class="sidebar-logo">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15l-5-5 1.41-1.41L11 14.17l7.59-7.59L20 8l-9 9z"/></svg>
        </div>
        <span>RAG Chat</span>
      </a>
      <button class="new-chat-btn" onclick="newConversation()" title="新对话">
        <svg viewBox="0 0 24 24" class="icon"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>

    <div class="sidebar-search" style="position:relative;">
      <span class="search-icon">
        <svg viewBox="0 0 24 24" class="icon"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <input type="text" id="convSearch" placeholder="搜索对话..." oninput="filterConversations(this.value)">
    </div>

    <div class="conversation-list" id="convList"></div>

    <div class="sidebar-footer">
      <button class="sidebar-footer-btn" onclick="openKnowledgeBase()">
        <svg viewBox="0 0 24 24" class="icon"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        知识库
        <span class="kb-doc-badge" id="kbDocBadge">0</span>
      </button>
      <button class="sidebar-footer-btn" onclick="toggleTheme()" id="themeToggle">
        <svg viewBox="0 0 24 24" class="icon" id="themeIcon"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <span id="themeLabel">切换主题</span>
      </button>
    </div>
  </aside>

  <!-- ======== Main ======== -->
  <main class="main-content" onclick="closeSidebarMobile(event)">
    <header class="chat-header">
      <div class="chat-header-left">
        <button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
          <svg viewBox="0 0 24 24" class="icon"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="chat-title" id="chatTitle">新对话</span>
      </div>
      <div class="chat-header-actions"></div>
    </header>

    <div class="messages-container" id="messagesContainer">
      <div class="messages" id="messages"></div>
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15l-5-5 1.41-1.41L11 14.17l7.59-7.59L20 8l-9 9z"/></svg>
        </div>
        <h3>开始新对话</h3>
        <p id="emptyStateHint">上传文档后，输入问题即可开始与知识库对话</p>
        <div class="suggest-chips" id="suggestChips"></div>
      </div>
    </div>

    <div class="input-area">
      <div class="stream-status" id="streamStatus"></div>
      <div class="input-wrapper">
        <textarea id="questionInput" rows="1" placeholder="输入您的问题..." onkeydown="onInputKeydown(event)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="toggleSend()">
          <svg viewBox="0 0 24 24" class="icon" id="sendIcon"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </main>
</div>

<!-- ======== Knowledge Base Overlay ======== -->
<div class="kb-overlay" id="kbOverlay" onclick="closeKnowledgeBase()"></div>

<!-- ======== Knowledge Base Panel ======== -->
<div class="kb-panel" id="kbPanel">
  <div class="kb-header">
    <h2>知识库</h2>
    <button class="kb-close" onclick="closeKnowledgeBase()">
      <svg viewBox="0 0 24 24" class="icon"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="kb-body">
    <div class="kb-section-title">上传文档</div>
    <div class="upload-area" id="kbUploadArea" onclick="document.getElementById('kbFileInput').click()">
      <div class="upload-icon">
        <svg viewBox="0 0 24 24" class="icon"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </div>
      <div style="margin-bottom:4px;">点击选择文件或拖拽到此处</div>
      <div style="font-size:11px;color:var(--text-muted);">支持 PDF、TXT、MD、CSV、JSON、XML、Excel、Word、PPT、HTML</div>
      <input type="file" id="kbFileInput" accept=".pdf,.txt,.md,.csv,.json,.xml,.xlsx,.xls,.docx,.pptx,.html,.htm" onchange="onFileSelected(event)">
    </div>
    <div class="doc-error" id="kbUploadError"></div>
    <div class="upload-progress" id="uploadProgress">
      <div class="upload-progress-label">
        <span id="uploadProgressName">上传中…</span>
        <span id="uploadProgressPct">0%</span>
      </div>
      <div class="upload-progress-bar"><div class="upload-progress-fill" id="uploadProgressFill"></div></div>
    </div>

    <div class="kb-section-title" style="margin-top:20px;">已入库文档</div>
    <ul class="doc-list" id="kbDocList">
      <li class="doc-empty">暂无文档</li>
    </ul>
    <button class="scan-btn" onclick="scanDocuments()">
      <svg viewBox="0 0 24 24" class="icon"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      扫描目录
    </button>
    <div class="chunk-preview-panel" id="chunkPreviewPanel">
      <div class="chunk-preview-header">
        <div>
          <div class="chunk-preview-title" id="chunkPreviewTitle">分块预览</div>
          <div class="chunk-preview-sub" id="chunkPreviewSub"></div>
        </div>
        <div class="chunk-preview-actions">
          <button type="button" class="chunk-preview-btn" onclick="closeChunkPreview()">关闭</button>
        </div>
      </div>
      <div id="chunkPreviewList"></div>
      <button type="button" class="chunk-preview-load" id="chunkPreviewLoadMore" style="display:none" onclick="loadMoreChunks()">加载更多分块</button>
    </div>
  </div>
</div>

<!-- ======== Toast ======== -->
<div class="toast-container" id="toastContainer"></div>

<!-- ======== Modal ======== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-dialog">
    <div class="modal-icon">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
    </div>
    <div class="modal-title" id="modalTitle">确认删除</div>
    <div class="modal-message" id="modalMessage">确定删除此对话？删除后不可恢复。</div>
    <div class="modal-actions">
      <button class="modal-btn-cancel" id="modalCancelBtn">取消</button>
      <button class="modal-btn-danger" id="modalConfirmBtn">删除</button>
    </div>
  </div>
</div>

<script>
/* ========== SVG Icons ========== */
var ICONS = {
  user: '<svg viewBox="0 0 24 24" class="icon"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
  assistant: '<svg viewBox="0 0 24 24" class="icon"><path d="M12 2a10 10 0 0 1 10 10c0 5-4 9-10 9S2 17 2 12 6 2 12 2z"/><path d="M8 12l2 2 4-4"/></svg>',
  copy: '<svg viewBox="0 0 24 24" class="icon"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
  check: '<svg viewBox="0 0 24 24" class="icon"><polyline points="20 6 9 17 4 12"/></svg>'
};

function makeCopyBtn(text) {
  var btn = document.createElement('button');
  btn.className = 'copy-btn';
  btn.innerHTML = ICONS.copy;
  btn.setAttribute('data-text', text);
  btn.onclick = function(e) {
    e.stopPropagation();
    doCopy(text, btn);
  };
  return btn;
}

function doCopy(text, btn) {
  (navigator.clipboard ? navigator.clipboard.writeText(text) : new Promise(function(resolve,reject) {
    var ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); resolve(); } catch(e) { reject(e); }
    document.body.removeChild(ta);
  })).then(function() {
    btn.innerHTML = ICONS.check;
    btn.classList.add('copied');
    setTimeout(function() {
      btn.innerHTML = ICONS.copy;
      btn.classList.remove('copied');
    }, 2000);
  }).catch(function() {});
}

/* ========== Session Manager ========== */
var STORAGE_KEY = 'rag_sessions';

function loadSessions() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { return []; }
}
function saveSessions(s) {
  while (s.length > 50) s.pop();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
}

function findSession(id) {
  return loadSessions().find(function(s) { return s.id === id; });
}

var currentSessionId = null;

function generateId() {
  return 's-' + Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
}

function createSession() {
  var id = generateId();
  var sessions = loadSessions();
  sessions.unshift({ id: id, title: '新对话', timestamp: new Date().toISOString(), messages: [] });
  saveSessions(sessions);
  return id;
}

/* ========== Modal ========== */
var pendingConfirmCallback = null;

function showConfirmDialog(title, message, onConfirm) {
  if (document.getElementById('modalOverlay').classList.contains('open')) return;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalMessage').textContent = message;
  pendingConfirmCallback = onConfirm;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  pendingConfirmCallback = null;
}

function confirmAction() {
  var cb = pendingConfirmCallback;
  closeModal();
  if (cb) cb();
}

document.getElementById('modalConfirmBtn').addEventListener('click', confirmAction);
document.getElementById('modalCancelBtn').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && document.getElementById('modalOverlay').classList.contains('open')) closeModal();
});

function deleteSession(id, e) {
  if (e) { e.stopPropagation(); e.preventDefault(); }
  showConfirmDialog('确认删除', '确定删除此对话？删除后不可恢复。', function() {
    var sessions = loadSessions().filter(function(s) { return s.id !== id; });
    saveSessions(sessions);
    if (currentSessionId === id) {
      if (sessions.length > 0) switchConversation(sessions[0].id);
      else { currentSessionId = createSession(); renderAll(); }
    }
    renderAll();
    toast('对话已删除', 'success');
  });
}

function saveMessage(sessionId, role, content) {
  var sessions = loadSessions();
  for (var i = 0; i < sessions.length; i++) {
    if (sessions[i].id === sessionId) {
      sessions[i].messages.push({ role: role, content: content, timestamp: new Date().toISOString() });
      sessions[i].preview = content.replace(/<[^>]*>/g, '').substring(0, 50);
      break;
    }
  }
  saveSessions(sessions);
}

function updateSessionTitle(sessionId, title) {
  var sessions = loadSessions();
  for (var i = 0; i < sessions.length; i++) {
    if (sessions[i].id === sessionId) {
      if (sessions[i].title === '新对话') sessions[i].title = title.substring(0, 30);
      sessions[i].timestamp = new Date().toISOString();
      break;
    }
  }
  saveSessions(sessions);
}

/* ========== Conversation UI ========== */
function filterConversations(q) {
  renderConversations(q);
}

function renderConversations(filter) {
  filter = filter || '';
  var list = document.getElementById('convList');
  var sessions = loadSessions();
  if (filter) {
    var lower = filter.toLowerCase();
    sessions = sessions.filter(function(s) { return s.title.toLowerCase().indexOf(lower) !== -1; });
  }
  if (sessions.length === 0) {
    list.innerHTML = '<div style="padding:28px 16px;text-align:center;color:var(--text-muted);font-size:13px;">暂无对话</div>';
    return;
  }
  list.innerHTML = sessions.map(function(s) {
    var active = s.id === currentSessionId ? 'active' : '';
    var time = formatTime(s.timestamp);
    var title = s.title || '新对话';
    return '<div class="conv-item ' + active + '" onclick="switchConversation(\'' + s.id + '\')">' +
      '<div class="conv-avatar"><svg viewBox="0 0 24 24" class="icon"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>' +
      '<div class="conv-info"><div class="conv-title">' + escapeHtml(title) + '</div><div class="conv-meta">' + time + '</div></div>' +
      '<button class="conv-delete" onclick="deleteSession(\'' + s.id + '\',event)"><svg viewBox="0 0 24 24" class="icon"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>' +
      '</div>';
  }).join('');
}

function renderCurrentSession() {
  var session = findSession(currentSessionId);
  var container = document.getElementById('messages');
  var emptyState = document.getElementById('emptyState');
  var title = document.getElementById('chatTitle');
  container.innerHTML = '';
  if (!session) { emptyState.style.display = 'flex'; title.textContent = '新对话'; return; }
  title.textContent = session.title || '新对话';
  if (!session.messages || session.messages.length === 0) {
    emptyState.style.display = 'flex'; return;
  }
  emptyState.style.display = 'none';
  for (var i = 0; i < session.messages.length; i++) {
    var isLast = (i === session.messages.length - 1);
    addMessageBubble(session.messages[i].role, session.messages[i].content, false, session.messages[i].timestamp, isLast);
  }
  scrollToBottom();
}

function renderAll() { renderConversations(); renderCurrentSession(); }

function switchConversation(id) {
  currentSessionId = id;
  renderAll();
  closeSidebarMobile();
}

function newConversation() {
  var current = findSession(currentSessionId);
  if (current && current.messages && current.messages.length > 0) {
    currentSessionId = createSession();
    renderAll();
  }
  closeSidebarMobile();
  document.getElementById('questionInput').focus();
}

function closeSidebarMobile(e) {
  if (e && e.target.closest('.sidebar-toggle, .chat-header-actions')) return;
  document.getElementById('sidebar').classList.remove('open');
}

/* ========== API Helper ========== */
function handleResult(r) {
  if (!r.ok) return Promise.reject(new Error('请求失败 (' + r.status + ')'));
  return r.json().then(function(res) {
    if (res.resCode !== '200') return Promise.reject(new Error(res.msg || '操作失败'));
    return res.obj;
  });
}

/* ========== Chat ========== */
var isStreaming = false;
var currentAbortController = null;

function toggleSend() {
  if (isStreaming) {
    stopStreaming();
  } else {
    sendMessage();
  }
}

function stopStreaming() {
  if (currentAbortController) {
    currentAbortController.abort();
  }
}

function updateSendButton() {
  var btn = document.getElementById("sendBtn");
  var icon = document.getElementById("sendIcon");
  btn.classList.toggle("stop", isStreaming);
  if (isStreaming) {
    icon.innerHTML = '<rect x="6" y="6" width="12" height="12" rx="1"/>';
  } else {
    icon.innerHTML = '<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>';
  }
}

function onInputKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); toggleSend(); }
}

function formatMessageTime(iso, isLatest) {
  if (!iso) return '';
  if (isLatest) {
    var diff = Date.now() - new Date(iso).getTime();
    if (diff < 60000) return '刚刚';
    if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
  }
  var d = new Date(iso), now = new Date();
  if (d.toDateString() === now.toDateString()) return pad(d.getHours())+':'+pad(d.getMinutes());
  var yd = new Date(now); yd.setDate(yd.getDate()-1);
  if (d.toDateString() === yd.toDateString()) return '昨天 ' + pad(d.getHours())+':'+pad(d.getMinutes());
  return (d.getMonth()+1)+'/'+d.getDate()+' '+pad(d.getHours())+':'+pad(d.getMinutes());
}

function addMessageBubble(role, content, save, timestamp, isLatest) {
  var container = document.getElementById('messages');
  var emptyState = document.getElementById('emptyState');
  if (emptyState) emptyState.style.display = 'none';

  var wrapper = document.createElement('div');
  wrapper.className = 'message-wrapper ' + role;

  var avatar = document.createElement('div');
  avatar.className = 'message-avatar ' + role;
  avatar.innerHTML = role === 'user' ? ICONS.user : ICONS.assistant;
  wrapper.appendChild(avatar);

  var body = document.createElement('div');
  body.className = 'message-body';

  var bubble = document.createElement('div');
  bubble.className = 'message ' + role;
  if (role === 'assistant' || role === 'error') {
    bubble.innerHTML = marked.parse(content || '');
  } else {
    bubble.textContent = content;
  }
  body.appendChild(bubble);

  if (content) {
    // Timestamp (always visible)
    var timeText = formatMessageTime(timestamp, isLatest);
    if (timeText) {
      var timeDiv = document.createElement('div');
      timeDiv.className = 'msg-time';
      timeDiv.textContent = timeText;
      body.appendChild(timeDiv);
    }
    // Copy button (visible on hover)
    var footer = document.createElement('div');
    footer.className = 'message-footer';
    footer.appendChild(makeCopyBtn(content));
    body.appendChild(footer);
  }
  wrapper.appendChild(body);

  container.appendChild(wrapper);
  scrollToBottom();
  if (save && currentSessionId) saveMessage(currentSessionId, role, content);
  return wrapper;
}

function copyText(text, btn) { doCopy(text, btn); }

function addMessageActions(body, content) {
  var td = document.createElement('div');
  td.className = 'msg-time';
  td.textContent = '刚刚';
  body.appendChild(td);
  var ft = document.createElement('div');
  ft.className = 'message-footer';
  ft.appendChild(makeCopyBtn(content));
  body.appendChild(ft);
}

function scrollToBottom() {
  var container = document.getElementById('messagesContainer');
  setTimeout(function() { container.scrollTop = container.scrollHeight; }, 10);
}

function sendMessage() {
  if (isStreaming) return;
  var input = document.getElementById('questionInput');
  var question = input.value.trim();
  if (!question) return;

  input.value = '';
  input.style.height = 'auto';

  if (!currentSessionId) currentSessionId = createSession();
  updateSessionTitle(currentSessionId, question);
  renderConversations();
  document.getElementById('chatTitle').textContent = question.substring(0, 30);

  addMessageBubble('user', question, true, new Date().toISOString(), true);
  isStreaming = true;
  updateSendButton();
  setStreamStatus('正在检索知识库并生成回答…', true);

  var wrapper = addMessageBubble('assistant', '');
  var bubble = wrapper.querySelector('.message.assistant');
  var messageBody = wrapper.querySelector('.message-body');
  var retrievalPanel = document.createElement('div');
  retrievalPanel.className = 'retrieval-panel collapsed';
  retrievalPanel.style.display = 'none';
  messageBody.insertBefore(retrievalPanel, bubble);
  var cursorSpan = document.createElement('span');
  cursorSpan.className = 'cursor-blink';
  bubble.appendChild(cursorSpan);

  var accumulated = '';
  currentAbortController = new AbortController();

  fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ question: question, sessionId: currentSessionId }),
    signal: currentAbortController.signal
  }).then(function(r) { return handleStream(r, wrapper, bubble, cursorSpan, accumulated, question, retrievalPanel); })
  .catch(function(err) {
    if (err.name === 'AbortError') return;
    cursorSpan.remove();
    bubble.innerHTML = '请求失败: ' + escapeHtml(err.message);
    bubble.className = 'message error';
    isStreaming = false;
    currentAbortController = null;
    updateSendButton();
    setStreamStatus('', false);
    toast(err.message, 'error');
  });
}

function handleStream(response, wrapper, bubble, cursorSpan, accumulated, question, retrievalPanel) {
  if (!response.ok) throw new Error('请求失败 (' + response.status + ')');
  var ct = response.headers.get('Content-Type') || '';
  if (ct.indexOf('text/event-stream') === -1) {
    return response.json().then(function(data) {
      cursorSpan.remove();
      isStreaming = false;
      updateSendButton();
      setStreamStatus('', false);
      var msg = data.msg || '请求失败';
      bubble.innerHTML = msg;
      bubble.className = 'message error';
      toast(msg, 'error');
    }).catch(function() {
      throw new Error('响应格式错误');
    });
  }
  var reader = response.body.getReader();
  var decoder = new TextDecoder();
  var buffer = '';
  var currentEvent = '';

  function read() {
    reader.read().then(function(result) {
      if (result.done) {
        cursorSpan.remove();
        isStreaming = false;
        updateSendButton();
        setStreamStatus('', false);
        bubble.innerHTML = marked.parse(accumulated);
        if (accumulated) {
          saveMessage(currentSessionId, 'assistant', accumulated);
          addMessageActions(bubble.parentElement, accumulated);
        }
        return;
      }
      buffer += decoder.decode(result.value, { stream: true });
      var lines = buffer.split('\n');
      buffer = lines.pop();
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (line.startsWith('event:')) {
          currentEvent = line.substring(6).trim();
          continue;
        }
        if (line.startsWith('data:')) {
          var data = line.substring(5).trim();
          if (data === '[DONE]') {
            cursorSpan.remove();
            isStreaming = false;
            updateSendButton();
            setStreamStatus('', false);
            bubble.innerHTML = marked.parse(accumulated);
            if (accumulated) {
              saveMessage(currentSessionId, 'assistant', accumulated);
              addMessageActions(bubble.parentElement, accumulated);
            }
            return;
          }
          if (currentEvent === 'error') {
            try {
              var errData = JSON.parse(data);
              cursorSpan.remove();
              bubble.innerHTML = (errData.msg || '流式处理失败');
              bubble.className = 'message error';
              isStreaming = false;
              updateSendButton();
              setStreamStatus('', false);
              toast(errData.msg || '流式处理失败', 'error');
            } catch(e) {
              console.warn('SSE error parse warning:', e);
            }
            currentEvent = '';
            continue;
          }
          if (currentEvent === 'retrieval') {
            try {
              var retrievalData = JSON.parse(data);
              renderRetrievalPanel(retrievalPanel, retrievalData.snippets || [], question || '');
              setStreamStatus('已检索到 ' + (retrievalData.snippets || []).length + ' 条参考片段，正在生成回答…', true);
            } catch(e) {
              console.warn('SSE retrieval parse warning:', e);
            }
            currentEvent = '';
            continue;
          }
          try {
            var parsed = JSON.parse(data);
            if (parsed.token) {
              accumulated += parsed.token;
              bubble.innerText = accumulated;
              bubble.appendChild(cursorSpan);
              scrollToBottom();
            }
          } catch(e) { console.warn('SSE parse warning:', e); }
          currentEvent = '';
        }
      }
      read();
    }).catch(function(err) {
      cursorSpan.remove();
      isStreaming = false;
      currentAbortController = null;
      updateSendButton();
      if (err.name === 'AbortError') {
        bubble.innerHTML = marked.parse(accumulated);
        if (accumulated) {
	          addMessageActions(bubble.parentElement, accumulated);
	        }
        return;
      }
      bubble.innerHTML = marked.parse(accumulated + '\n\n**错误:** ' + escapeHtml(err.message));
      bubble.className = 'message error';
      toast(err.message, 'error');
    });
  }
  read();
}

function tokenizeForHighlight(query) {
  if (!query) return [];
  var terms = [];
  var latin = query.match(/[a-zA-Z0-9]{2,}/g) || [];
  latin.forEach(function(t) { terms.push(t); });
  var cjk = query.match(/[\u4e00-\u9fff]{2,}/g) || [];
  cjk.forEach(function(t) { terms.push(t); });
  if (!terms.length && query.trim().length >= 2) terms.push(query.trim());
  var seen = {};
  return terms.filter(function(t) {
    var key = t.toLowerCase();
    if (seen[key]) return false;
    seen[key] = true;
    return true;
  });
}

function highlightQueryTerms(text, query) {
  var html = escapeHtml(text || '');
  tokenizeForHighlight(query).forEach(function(term) {
    var re = new RegExp(term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
    html = html.replace(re, function(match) {
      return '<mark class="snippet-highlight">' + match + '</mark>';
    });
  });
  return html;
}

function renderRetrievalPanel(panel, snippets, query) {
  if (!panel || !snippets || !snippets.length) return;
  panel.style.display = 'block';
  panel.classList.remove('collapsed');
  panel.innerHTML =
    '<div class="retrieval-panel-header">' +
      '<span>检索到的参考片段 (' + snippets.length + ')</span>' +
      '<button type="button" class="retrieval-panel-toggle" onclick="toggleRetrievalPanel(this)">收起</button>' +
    '</div>' +
    '<div class="retrieval-snippet-list">' +
      snippets.map(function(s, idx) {
        var docName = s.documentName || '参考文档';
        var text = s.text || '';
        return '<div class="retrieval-snippet" data-doc-name="' + escapeHtml(docName) + '" onclick="openRetrievalSnippetDoc(this)">' +
          '<span class="retrieval-snippet-source">' + escapeHtml(docName) + '</span>' +
          '<span class="retrieval-snippet-text">' + highlightQueryTerms(text, query) + '</span></div>';
      }).join('') +
    '</div>';
}

function toggleRetrievalPanel(btn) {
  var panel = btn.closest('.retrieval-panel');
  if (!panel) return;
  panel.classList.toggle('collapsed');
  btn.textContent = panel.classList.contains('collapsed') ? '展开' : '收起';
}

function openRetrievalSnippetDoc(el) {
  var docName = el.getAttribute('data-doc-name');
  if (!docName) return;
  fetch('/api/documents')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var docs = (data && data.obj) ? data.obj : [];
      var match = docs.find(function(d) { return d.documentName === docName; });
      if (match && match.id) {
        openKnowledgeBase();
        showChunkPreview(match.id, match.documentName, match.chunks || 0);
        toast('已打开「' + docName + '」分块预览', 'success');
      } else {
        toast('未找到来源文档：' + docName, 'error');
      }
    })
    .catch(function(err) { toast(err.message || '打开来源文档失败', 'error'); });
}

/* ========== Auto Resize ========== */
document.getElementById('questionInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 160) + 'px';
});

/* ========== Theme ========== */
function getTheme() {
  return localStorage.getItem('rag_theme') || 'light';
}
function setTheme(theme) {
  localStorage.setItem('rag_theme', theme);
  var isLight = theme === 'light';
  document.documentElement.classList.toggle('light-theme', !isLight);
  document.getElementById('themeLabel').textContent = isLight ? '深色模式' : '亮色模式';
  var icon = document.getElementById('themeIcon');
  if (isLight) {
    icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  } else {
    icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
  }
}
function toggleTheme() { setTheme(getTheme() === 'light' ? 'dark' : 'light'); }

/* ========== Knowledge Base ========== */
function openKnowledgeBase() {
  document.getElementById('kbPanel').classList.add('open');
  document.getElementById('kbOverlay').classList.add('open');
  loadDocList();
}
function closeKnowledgeBase() {
  document.getElementById('kbPanel').classList.remove('open');
  document.getElementById('kbOverlay').classList.remove('open');
}
function onFileSelected(e) {
  var file = e.target.files[0];
  if (!file) return;
  uploadFile(file);
  e.target.value = '';
}

var uploadArea = document.getElementById('kbUploadArea');
uploadArea.addEventListener('dragover', function(e) { e.preventDefault(); this.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', function() { this.classList.remove('dragover'); });
uploadArea.addEventListener('drop', function(e) {
  e.preventDefault(); this.classList.remove('dragover');
  var file = e.dataTransfer.files[0];
  if (file) uploadFile(file);
});

function uploadFile(file) {
  var ext = file.name.toLowerCase().slice(file.name.lastIndexOf('.'));
  var valid = ['.pdf','.txt','.md','.csv','.json','.xml','.xlsx','.xls','.docx','.pptx','.html','.htm'];
  if (valid.indexOf(ext) === -1) { showUploadError('不支持的文件格式'); return; }
  if (file.size > 20*1024*1024) { showUploadError('文件大小不能超过 20MB'); return; }
  hideUploadError();
  setUploadProgress(0, file.name);
  var fd = new FormData(); fd.append('file', file);
  var xhr = new XMLHttpRequest();
  xhr.open('POST', '/api/documents/upload');
  xhr.upload.onprogress = function(e) {
    if (!e.lengthComputable) return;
    setUploadProgress(Math.round((e.loaded / e.total) * 100), file.name);
  };
  xhr.upload.onloadend = function() {
    setUploadProcessing('正在分块入库与向量化…');
  };
  xhr.onload = function() {
    hideUploadProgress();
    try {
      var payload = JSON.parse(xhr.responseText || '{}');
      if (xhr.status >= 400 || payload.resCode !== '200') {
        throw new Error(payload.msg || ('上传失败 (' + xhr.status + ')'));
      }
      var doc = payload.obj;
      toast('"' + doc.documentName + '" 上传成功 (' + doc.chunks + ' 分块)', 'success');
      loadDocList();
      if (doc.id) showChunkPreview(doc.id, doc.documentName, doc.chunks);
      refreshLearningUx();
    } catch (err) {
      showUploadError(err.message);
      toast('上传失败', 'error');
    }
  };
  xhr.onerror = function() {
    hideUploadProgress();
    showUploadError('网络错误，上传失败');
    toast('上传失败', 'error');
  };
  xhr.send(fd);
}
function setUploadProgress(pct, name) {
  var panel = document.getElementById('uploadProgress');
  panel.classList.add('visible');
  panel.classList.remove('processing');
  document.getElementById('uploadProgressName').textContent = '正在上传 ' + name + '…';
  document.getElementById('uploadProgressPct').textContent = pct + '%';
  document.getElementById('uploadProgressFill').style.width = pct + '%';
}
function setUploadProcessing(label) {
  var panel = document.getElementById('uploadProgress');
  panel.classList.add('visible', 'processing');
  document.getElementById('uploadProgressName').textContent = label;
  document.getElementById('uploadProgressPct').textContent = '处理中';
}
function hideUploadProgress() {
  var panel = document.getElementById('uploadProgress');
  panel.classList.remove('visible', 'processing');
  document.getElementById('uploadProgressFill').style.width = '0%';
}
function showUploadError(m) { var el = document.getElementById('kbUploadError'); el.textContent = m; el.classList.add('visible'); }
function hideUploadError() { document.getElementById('kbUploadError').classList.remove('visible'); }

function scanDocuments() {
  fetch('/api/documents/scan', { method: 'POST' })
    .then(handleResult)
    .then(function(docs) {
      toast('目录扫描完成', 'success');
      loadDocList();
      refreshLearningUx();
      if (docs && docs.length) showChunkPreview(docs[0].id, docs[0].documentName, docs[0].chunks);
    })
    .catch(function(e) { toast('扫描失败: ' + e.message, 'error'); });
}

var selectedDocId = null;
var chunkPreviewState = { docId: null, docName: '', total: 0, limit: 12 };
var DEFAULT_SUGGESTIONS = [
  'RAG 中的向量检索是怎么工作的？',
  'Embedding 用来做什么？',
  '查询改写解决什么问题？'
];

function closeChunkPreview() {
  document.getElementById('chunkPreviewPanel').classList.remove('open');
  selectedDocId = null;
  chunkPreviewState = { docId: null, docName: '', total: 0, limit: 12 };
  document.querySelectorAll('.doc-item').forEach(function(el) { el.classList.remove('selected'); });
}

function renderChunkItems(chunks) {
  return chunks.map(function(c, idx) {
    return '<div class="chunk-preview-item" data-idx="' + idx + '" onclick="toggleChunkExpand(this, event)">' +
      '<strong><span>分块 #' + (c.chunkIndex + 1) + ' · ' + c.charCount + ' 字</span>' +
      '<span class="chunk-copy" onclick="copyChunkText(event, ' + idx + ')">复制</span></strong>' +
      '<span class="chunk-text">' + escapeHtml(c.preview) + '</span></div>';
  }).join('');
}

function toggleChunkExpand(el, e) {
  if (e && e.target && e.target.classList.contains('chunk-copy')) return;
  el.classList.toggle('expanded');
}

function copyChunkText(e, idx) {
  e.stopPropagation();
  var cache = window.__chunkPreviewCache || [];
  var text = (cache[idx] && cache[idx].preview) ? cache[idx].preview : '';
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() { toast('已复制分块文本', 'success'); });
  } else {
    toast('复制失败：浏览器不支持', 'error');
  }
}

function updateChunkLoadMore(chunksLoaded) {
  var btn = document.getElementById('chunkPreviewLoadMore');
  var total = chunkPreviewState.total || chunksLoaded;
  if (total > chunksLoaded && chunksLoaded < 30) {
    btn.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '加载更多（已显示 ' + chunksLoaded + ' / ' + total + '）';
  } else {
    btn.style.display = 'none';
  }
  document.getElementById('chunkPreviewSub').textContent =
    total ? '共 ' + total + ' 个分块 · 点击分块展开 · 已显示 ' + Math.min(chunksLoaded, total) + ' 个' : '';
}

function showChunkPreview(docId, docName, totalChunks) {
  selectedDocId = docId;
  chunkPreviewState = { docId: docId, docName: docName, total: totalChunks || 0, limit: 12 };
  var panel = document.getElementById('chunkPreviewPanel');
  var list = document.getElementById('chunkPreviewList');
  document.getElementById('chunkPreviewTitle').textContent = '分块预览 · ' + docName;
  list.innerHTML = '<div class="chunk-preview-item">加载中…</div>';
  panel.classList.add('open');
  document.querySelectorAll('.doc-item').forEach(function(el) {
    el.classList.toggle('selected', el.getAttribute('data-doc-id') === String(docId));
  });
  fetchChunkPage(docId, chunkPreviewState.limit);
}

function fetchChunkPage(docId, limit) {
  var list = document.getElementById('chunkPreviewList');
  fetch('/api/documents/' + docId + '/chunks?limit=' + limit)
    .then(handleResult)
    .then(function(chunks) {
      window.__chunkPreviewCache = chunks || [];
      if (!chunks || !chunks.length) {
        list.innerHTML = '<div class="chunk-preview-item">暂无分块数据</div>';
        updateChunkLoadMore(0);
        return;
      }
      list.innerHTML = renderChunkItems(chunks);
      updateChunkLoadMore(chunks.length);
    })
    .catch(function(err) {
      list.innerHTML = '<div class="chunk-preview-item">预览失败: ' + escapeHtml(err.message) + '</div>';
    });
}

function loadMoreChunks() {
  if (!chunkPreviewState.docId) return;
  chunkPreviewState.limit = Math.min(chunkPreviewState.limit + 12, 30);
  var btn = document.getElementById('chunkPreviewLoadMore');
  btn.disabled = true;
  btn.textContent = '加载中…';
  fetchChunkPage(chunkPreviewState.docId, chunkPreviewState.limit);
}

function refreshLearningUx() {
  fetch('/api/documents')
    .then(handleResult)
    .then(function(docs) {
      var count = (docs && docs.length) || 0;
      var badge = document.getElementById('kbDocBadge');
      badge.textContent = String(count);
      badge.classList.toggle('visible', count > 0);
      var hint = document.getElementById('emptyStateHint');
      var chips = document.getElementById('suggestChips');
      if (count > 0) {
        hint.textContent = '知识库已有 ' + count + ' 份文档，可直接提问或点击推荐问题';
        chips.innerHTML = DEFAULT_SUGGESTIONS.map(function(q) {
          return '<button type="button" class="suggest-chip" onclick="applySuggestion(this)">' + escapeHtml(q) + '</button>';
        }).join('');
      } else {
        hint.textContent = '先在知识库上传或扫描 data/docs/，再开始问答';
        chips.innerHTML = '<button type="button" class="suggest-chip" onclick="openKnowledgeBase()">打开知识库上传</button>';
      }
    })
    .catch(function() {});
}

function applySuggestion(el) {
  var input = document.getElementById('questionInput');
  input.value = el.textContent;
  input.focus();
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 160) + 'px';
}

function setStreamStatus(text, active) {
  var el = document.getElementById('streamStatus');
  if (!text) { el.className = 'stream-status'; el.innerHTML = ''; return; }
  el.className = 'stream-status' + (active ? ' active' : '');
  el.innerHTML = active ? '<span class="stream-dot"></span><span>' + escapeHtml(text) + '</span>' : escapeHtml(text);
}

function loadDocList() {
  var list = document.getElementById('kbDocList');
  fetch('/api/documents')
    .then(handleResult)
    .then(function(docs) {
      if (!docs || docs.length === 0) { list.innerHTML = '<li class="doc-empty">暂无文档</li>'; return; }
      list.innerHTML = docs.map(function(d) {
        return '<li class="doc-item" data-doc-id="' + d.id + '" onclick="showChunkPreview(' + d.id + ', ' + JSON.stringify(d.documentName) + ', ' + (d.chunks || 0) + ')">' +
          '<span class="doc-icon"><svg viewBox="0 0 24 24" class="icon"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span>' +
          '<span class="doc-info"><div class="doc-name">' + escapeHtml(d.documentName) + '</div><div class="doc-meta">' + d.chunks + ' 分块 · 点击查看预览</div></span>' +
          '<button class="doc-delete-btn" onclick="deleteDocument(' + d.id + ', event)" title="删除文档"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button>' +
          '</li>';
      }).join('');
      refreshLearningUx();
    })
    .catch(function(err) { list.innerHTML = '<li class="doc-empty">加载失败: ' + escapeHtml(err.message) + '</li>'; });
}

function deleteDocument(id, e) {
  if (e) { e.stopPropagation(); e.preventDefault(); }
  showConfirmDialog('确认删除', '确定删除此文档？文档及向量数据将被永久删除。', function() {
    fetch('/api/documents/' + id, { method: 'DELETE' })
      .then(handleResult)
      .then(function() { toast('文档已删除', 'success'); loadDocList(); refreshLearningUx(); document.getElementById('chunkPreviewPanel').classList.remove('open'); })
      .catch(function(err) { toast('删除失败: ' + err.message, 'error'); });
  });
}

/* ========== Utilities ========== */
function escapeHtml(s) {
  var d = document.createElement('div'); d.appendChild(document.createTextNode(s)); return d.innerHTML;
}
function formatTime(iso) {
  if (!iso) return '';
  var d = new Date(iso), now = new Date();
  if (d.toDateString() === now.toDateString()) return pad(d.getHours())+':'+pad(d.getMinutes());
  var yd = new Date(now); yd.setDate(yd.getDate()-1);
  if (d.toDateString() === yd.toDateString()) return '昨天';
  return (d.getMonth()+1)+'/'+d.getDate();
}
function pad(n) { return n < 10 ? '0'+n : ''+n; }

function toast(msg, type) {
  type = type || 'info';
  var c = document.getElementById('toastContainer');
  var el = document.createElement('div');
  el.className = 'toast ' + type;
  var icons = {
    success: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="16 8 10 16 7 13"/></svg>',
    error: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    info: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'
  };
  el.innerHTML = (icons[type] || icons.info) + '<span>' + escapeHtml(msg) + '</span>';
  c.appendChild(el);
  setTimeout(function() { el.style.opacity = '0'; el.style.transform = 'translateY(8px) scale(0.96)'; el.style.transition = 'all 0.25s ease'; setTimeout(function() { el.remove(); }, 250); }, 3500);
}

/* ========== Init ========== */
(function init() {
  setTheme(getTheme());
  var sessions = loadSessions();
  currentSessionId = sessions.length > 0 ? sessions[0].id : createSession();
  renderAll();
  refreshLearningUx();
})();
</script>
