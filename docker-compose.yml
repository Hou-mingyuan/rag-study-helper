# InMemory 向量库 — 零外部依赖，开箱即用
#
# 使用方式：
#   1. 创建 .env 文件（参考下方示例）或直接设置环境变量
#   2. 构建并启动:  docker compose up -d
#   3. 查看日志:    docker compose logs -f
#   4. 访问:       http://localhost:8080
#   5. 停止:       docker compose down
#
# .env 文件示例：
#   APP_RAG_CHAT_API_KEY=sk-deepseek-xxx
#   APP_RAG_EMBEDDING_API_KEY=sk-siliconflow-xxx
#   APP_FEISHU_APP_ID=cli_xxx
#   APP_FEISHU_APP_SECRET=xxx
#   APP_FEISHU_SPACE_ID=your-feishu-space-id

services:
  mysql:
    image: mysql:8.0
    container_name: rag-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: rag_study_helper
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: rag-app
    ports:
      - "${APP_HOST_PORT:-8080}:8080"
    environment:
      # === MySQL ===
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/rag_study_helper?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      # === Redis ===
      SPRING_REDIS_HOST: ${SPRING_REDIS_HOST:-redis}
      SPRING_REDIS_PORT: ${SPRING_REDIS_PORT:-6379}
      SPRING_REDIS_PASSWORD: ${SPRING_REDIS_PASSWORD:-}
      # === RAG 基础配置 ===
      APP_RAG_PROVIDER: ${APP_RAG_PROVIDER:-mock}
      APP_RAG_CHAT_API_KEY: ${APP_RAG_CHAT_API_KEY:-}
      APP_RAG_CHAT_BASE_URL: ${APP_RAG_CHAT_BASE_URL:-https://api.deepseek.com}
      APP_RAG_CHAT_MODEL_NAME: ${APP_RAG_CHAT_MODEL_NAME:-deepseek-v4-flash}
      APP_RAG_EMBEDDING_API_KEY: ${APP_RAG_EMBEDDING_API_KEY:-}
      APP_RAG_EMBEDDING_BASE_URL: ${APP_RAG_EMBEDDING_BASE_URL:-https://api.siliconflow.cn/v1}
      APP_RAG_EMBEDDING_MODEL_NAME: ${APP_RAG_EMBEDDING_MODEL_NAME:-BAAI/bge-large-zh-v1.5}
      APP_RAG_RERANK_API_KEY: ${APP_RAG_RERANK_API_KEY:-${APP_RAG_EMBEDDING_API_KEY}}
      APP_RAG_RERANK_BASE_URL: ${APP_RAG_RERANK_BASE_URL:-https://api.siliconflow.cn/v1}
      APP_RAG_RERANK_MODEL_NAME: ${APP_RAG_RERANK_MODEL_NAME:-BAAI/bge-reranker-v2-m3}
      APP_RAG_SCORE_THRESHOLD: ${APP_RAG_SCORE_THRESHOLD:-0.80}
      # === 飞书同步（可选）===
      APP_FEISHU_APP_ID: ${APP_FEISHU_APP_ID:-}
      APP_FEISHU_APP_SECRET: ${APP_FEISHU_APP_SECRET:-}
      APP_FEISHU_SPACE_ID: ${APP_FEISHU_SPACE_ID:-}
      APP_FEISHU_CRON: ${APP_FEISHU_CRON:-0 0 */12 * * ?}
      APP_FEISHU_SYNC_ENABLED: ${APP_FEISHU_SYNC_ENABLED:-false}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./data/docs:/app/data/docs

volumes:
  mysql-data:
