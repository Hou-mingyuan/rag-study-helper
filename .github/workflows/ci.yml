name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Maven tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      - name: Run tests
        run: mvn -B test

  docker-smoke:
    name: Docker Compose smoke
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start stack
        env:
          APP_RAG_CHAT_API_KEY: ci-smoke-dummy
          APP_RAG_EMBEDDING_API_KEY: ci-smoke-dummy
        run: docker compose up -d --build

      - name: Wait for health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/api/health >/dev/null; then
              echo "Health OK"
              exit 0
            fi
            echo "Waiting for app... ($i/60)"
            sleep 5
          done
          echo "Timed out waiting for /api/health"
          docker compose logs
          exit 1

      - name: HTTP smoke (health + documents)
        run: |
          curl -sf http://localhost:8080/api/health
          curl -sf http://localhost:8080/api/documents

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Mock demo smoke (scripts/smoke-mock-demo.mjs)
        run: node scripts/smoke-mock-demo.mjs http://localhost:8080

      - name: Tear down
        if: always()
        run: docker compose down -v
